<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="85" fill="#FFFFFF"/>
  
  <!-- Chart bars with gradient from blue to violet -->
  <defs>
    <linearGradient id="chartGradient512" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rising chart bars -->
  <rect x="160" y="293" width="48" height="80" rx="5" fill="url(#chartGradient512)" opacity="0.7"/>
  <rect x="227" y="253" width="48" height="120" rx="5" fill="url(#chartGradient512)" opacity="0.85"/>
  <rect x="293" y="187" width="48" height="186" rx="5" fill="url(#chartGradient512)"/>
  
  <!-- Upward arrow/trend line -->
