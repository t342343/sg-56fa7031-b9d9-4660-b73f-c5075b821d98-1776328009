<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="192" height="192" rx="32" fill="#1E293B"/>
  
  <!-- Chart bars with gradient from blue to violet -->
  <defs>
    <linearGradient id="chartGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rising chart bars -->
  <rect x="60" y="110" width="18" height="30" rx="2" fill="url(#chartGradient)" opacity="0.7"/>
  <rect x="85" y="95" width="18" height="45" rx="2" fill="url(#chartGradient)" opacity="0.85"/>
  <rect x="110" y="70" width="18" height="70" rx="2" fill="url(#chartGradient)"/>
  
  <!-- Upward arrow/trend line -->
  <path d="M 65 105 L 95 85 L 120 60" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M 115 52 L 125 60 L 120 70 Z" fill="#8B5CF6"/>
</svg>